    <h1>Code Log 4: CSS Color</h1>
    <h2>Part 1</h2>
    <h3>What do these CSS properties do?</h3>
    <h3>color</h3>
    <textarea cols="80" rows="4">
the color property will change the color of the selected text appearing on your website. it is implemented on a css file by putting color: ___; in the curly brackets. By default, I believe the color will be black.
    </textarea>
    <h3>background-color</h3>
    <textarea cols="80" rows="4">
The background-color property will change the background color of the determined area on the website. Once again, it is implemented on a css file with background-color: ___; in the curly brackets.
    </textarea>
    <h3>border-color</h3>
    <textarea cols="80" rows="4">
The border-color property will change the border color of the determined area on the website. Once again, it is implemented on a css file with border-color: ___; in the curly brackets.
    </textarea>
    <h2>Part 2</h2>
    <h3>How does CSS accept color as a value?</h3>
    <h3>Named</h3>
    <textarea cols="80" rows="4">
Named color is a built in color system that just needs you to type the color you want. Implimentation looks like color: red; in the body of the brackets for example.
    </textarea>
    <h3>Hexadecimal</h3>
    <textarea cols="80" rows="4">
Hex colors need a # in front and additionally take 6 characters. Implimentation may look like color: #FF0000; in the body of the brackets. Additionally, the first 2 characters are the red componet, the next 2 are green, and the last 2 are blue. 
    </textarea>
    <h3>RGB</h3>
    <textarea cols="80" rows="5">
RGB colors start out with a rgb() and take 3 numbers 0-255 as input. Implimentation may look like color: rgb(255, 0, 0); in the body of the brackets. Additionally, the first number is the red componet, the next is green, and the last is blue. 
    </textarea>
    <h3>HSL</h3>
    <textarea cols="80" rows="5">
HSL colors start with a hsl() and once again takes 3 numbers as input. The first number is the hue, and ranges from 0-360. The second is saturation and is a percent 0-100. The last is lightness which is a percent 0-100. Implimentation may look like color: hsl(360, 100%, 100%);
    </textarea>
</body>
